name: Release overlays

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release overlays
    environment: prod
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Verify tag matches package versions
        run: uv run --dev python scripts/verify_release_versions.py --tag ${{ github.ref_name }}
      - name: Build Rust server
        run: cargo build --manifest-path rust/overlays-server/Cargo.toml
      - name: Run Rust tests
        run: cargo test --manifest-path rust/overlays-server/Cargo.toml
      - name: Run Python tests
        run: uv run --dev pytest -v
      - name: Build release Rust server
        run: cargo build --release --manifest-path rust/overlays-server/Cargo.toml
      - name: Stage bundled server binary
        run: uv run --dev python scripts/stage_server_binary.py
      - name: Build wheel
        run: uv build --wheel
      - name: Verify wheel contents
        shell: powershell
        run: |
          $wheel = Get-ChildItem dist\*.whl | Select-Object -ExpandProperty FullName
          uv run --dev python scripts/verify_wheel.py $wheel
      - name: Smoke test packaged wheel
        shell: powershell
        run: |
          $wheel = Get-ChildItem dist\*.whl | Select-Object -ExpandProperty FullName
          uv run --dev python scripts/smoke_test_wheel.py $wheel
      - name: Build standalone zip
        run: uv run --dev python scripts/build_release_bundle.py --version ${{ github.ref_name }}
      - name: Write release checksums
        shell: powershell
        run: |
          $wheel = Get-ChildItem dist\*.whl | Select-Object -ExpandProperty FullName
          $zip = Get-ChildItem .tmp-dist\release\*.zip | Select-Object -ExpandProperty FullName
          uv run --dev python scripts/write_checksums.py --output .tmp-dist\release\SHA256SUMS.txt $wheel $zip
      - name: Verify release assets
        shell: powershell
        run: |
          if (-not (Test-Path .tmp-dist\release\SHA256SUMS.txt)) {
            throw "Missing release checksum asset"
          }
          if (-not (Get-ChildItem .tmp-dist\release\*.zip)) {
            throw "Missing standalone zip asset"
          }
      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $wheel = Get-ChildItem dist\*.whl | Select-Object -ExpandProperty FullName
          $zip = Get-ChildItem .tmp-dist\release\*.zip | Select-Object -ExpandProperty FullName
          $assets = @($wheel, $zip, ".tmp-dist\release\SHA256SUMS.txt")
          $tag = "${{ github.ref_name }}"
          $existing = gh release list --limit 1000 --json tagName | ConvertFrom-Json | Where-Object { $_.tagName -eq $tag }
          if ($existing) {
            gh release upload ${{ github.ref_name }} $assets --clobber
          } else {
            gh release create ${{ github.ref_name }} $assets --generate-notes
          }
      - name: Publish wheel to PyPI
        shell: powershell
        run: |
          $wheel = Get-ChildItem dist\*.whl | Select-Object -ExpandProperty FullName
          uv publish $wheel -t ${{ secrets.PYPI_TOKEN }} --check-url https://pypi.org/simple/overlays/
